<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRIGGER2MARKER — BVL Support</title>
    <link rel="icon" type="image/png" href="/icons/192.png" />
    <script>
      (() => {
        const stored = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = stored || (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <script type="module" crossorigin src="/trigger2marker/assets/index-DmY3_9cq.js"></script>
    <link rel="stylesheet" crossorigin href="/trigger2marker/assets/index-KR-bkz2T.css">
    <style>
      .nav-bar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 8px 16px; background: var(--bg-primary, #060d14);
        border-bottom: 1px solid var(--border, #1a3a55);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .nav-bar a {
        color: var(--accent, #3a7bd5); text-decoration: none; font-size: 0.85rem;
        display: flex; align-items: center; gap: 4px;
      }
      .nav-bar a:hover { color: var(--accent-light, #5a9df5); }
      .theme-btn {
        background: none; border: 1px solid var(--border, #1a3a55);
        border-radius: 999px; width: 32px; height: 32px;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        color: var(--text-primary, #e2e8f0);
      }
      .theme-btn:hover { border-color: var(--accent, #3a7bd5); }
    </style>
  </head>
  <body>
    <div class="nav-bar">
      <a href="/">← Home</a>
      <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
        </svg>
      </button>
    </div>
    <div id="app"></div>
    <script>
      function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme') || 'dark';
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      }
    </script>
  </body>
</html>
